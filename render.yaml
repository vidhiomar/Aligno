services:
  - type: web
    name: aligno-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head && python -m app.utils.seed_demo
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./goalsync.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
